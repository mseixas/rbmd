<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Nivel de bolha / inclinometro para Meta Ray-Ban Display - testa o sensor de orientacao.">
  <meta name="mrbd-web-app-capable" content="yes">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Nível de Bolha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 600px; height: 600px; overflow: hidden;
      background: #000; color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    #app { width: 600px; height: 600px; position: relative; }

    /* Tela inicial (gesto do usuário para permissão) */
    #start {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 36px; z-index: 10;
    }
    #start h1 { font-size: 40px; color: #00d4ff; }
    #start p { font-size: 20px; color: #aaa; text-align: center; max-width: 460px; }

    .focusable {
      transition: all 150ms ease; border: 2px solid transparent;
      min-height: 88px; outline: none;
    }
    .focusable:focus {
      border-color: #00d4ff; box-shadow: 0 0 20px rgba(0,212,255,0.45);
    }
    button.focusable {
      background: #111; color: #fff; font-size: 24px; font-weight: 600;
      padding: 0 40px; border-radius: 16px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      border: 2px solid #333;
    }
    button.focusable:focus { border-color: #00d4ff; }

    /* Tela do nível */
    #level { display: none; width: 600px; height: 600px;
      flex-direction: column; align-items: center; padding-top: 28px; }
    #title { font-size: 22px; color: #00d4ff; letter-spacing: 2px; margin-bottom: 14px; }

    #ring {
      position: relative; width: 360px; height: 360px; border-radius: 50%;
      border: 3px solid #2a2a2a;
      box-shadow: inset 0 0 30px rgba(255,255,255,0.04);
    }
    /* miras */
    #ring::before, #ring::after {
      content: ""; position: absolute; background: #1f1f1f;
    }
    #ring::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #ring::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
    #target {
      position: absolute; left: 50%; top: 50%; width: 92px; height: 92px;
      transform: translate(-50%,-50%); border-radius: 50%;
      border: 2px solid #444;
    }
    #bubble {
      position: absolute; left: 50%; top: 50%; width: 64px; height: 64px;
      margin: -32px 0 0 -32px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffe680, #f5a623);
      box-shadow: 0 0 24px rgba(245,166,35,0.55);
      transition: background 120ms, box-shadow 120ms;
      will-change: transform;
    }
    #bubble.level {
      background: radial-gradient(circle at 35% 35%, #b6ffcf, #2ecc71);
      box-shadow: 0 0 30px rgba(46,204,113,0.8);
    }

    #readout { margin-top: 26px; display: flex; gap: 48px; font-variant-numeric: tabular-nums; }
    .read { text-align: center; }
    .read .lbl { font-size: 16px; color: #888; letter-spacing: 1px; }
    .read .val { font-size: 40px; font-weight: 700; color: #fff; }
    #status { margin-top: 8px; font-size: 20px; color: #2ecc71; height: 26px; }

    #controls { margin-top: 18px; display: flex; gap: 18px; }
    #controls button.focusable { min-height: 64px; font-size: 20px; padding: 0 28px; }

    .hidden { display: none !important; }
    #err { color: #ff5252; font-size: 18px; margin-top: 12px; text-align:center; max-width:480px;}
  </style>
</head>
<body>
  <div id="app">
    <div id="start">
      <h1>Nível de Bolha</h1>
      <p>Use os óculos como nível. Pressione <b>Enter</b> (pinça) para começar e liberar o sensor de orientação.</p>
      <button id="startBtn" class="focusable">▶  Iniciar</button>
      <div id="err"></div>
    </div>

    <div id="level">
      <div id="title">NÍVEL DE BOLHA</div>
      <div id="ring">
        <div id="target"></div>
        <div id="bubble"></div>
      </div>
      <div id="readout">
        <div class="read"><div class="lbl">FRENTE/TRÁS</div><div class="val" id="pitch">0°</div></div>
        <div class="read"><div class="lbl">ESQ/DIR</div><div class="val" id="roll">0°</div></div>
      </div>
      <div id="status"></div>
      <div id="controls">
        <button id="zeroBtn" class="focusable">Calibrar (zerar)</button>
        <button id="resetBtn" class="focusable">Resetar</button>
      </div>
    </div>
  </div>

  <script>
    var DPAD = { UP:'ArrowUp', DOWN:'ArrowDown', LEFT:'ArrowLeft', RIGHT:'ArrowRight', SELECT:'Enter' };

    var offsetBeta = 0, offsetGamma = 0;
    var lastBeta = 0, lastGamma = 0;
    var running = false;

    var startScreen = document.getElementById('start');
    var levelScreen = document.getElementById('level');
    var bubble = document.getElementById('bubble');
    var pitchEl = document.getElementById('pitch');
    var rollEl  = document.getElementById('roll');
    var statusEl = document.getElementById('status');
    var errEl = document.getElementById('err');

    var MAX_TILT = 20;   // graus mapeados ao raio
    var RADIUS   = 130;  // px de deslocamento máximo da bolha
    var ticking = false;

    function handleOrientation(e) {
      if (e.beta === null || e.gamma === null) return;
      lastBeta = e.beta; lastGamma = e.gamma;
      if (!ticking) {
        ticking = true;
        requestAnimationFrame(render);
      }
    }

    function render() {
      ticking = false;
      var b = lastBeta - offsetBeta;    // frente/trás
      var g = lastGamma - offsetGamma;  // esq/dir

      var cb = Math.max(-MAX_TILT, Math.min(MAX_TILT, b));
      var cg = Math.max(-MAX_TILT, Math.min(MAX_TILT, g));
      var x = (cg / MAX_TILT) * RADIUS;
      var y = (cb / MAX_TILT) * RADIUS;
      bubble.style.transform = 'translate(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px)';

      pitchEl.textContent = b.toFixed(1) + '°';
      rollEl.textContent  = g.toFixed(1) + '°';

      var level = Math.abs(b) <= 1 && Math.abs(g) <= 1;
      bubble.classList.toggle('level', level);
      statusEl.textContent = level ? '✓ NIVELADO' : '';
    }

    function startIMU() {
      window.addEventListener('deviceorientation', handleOrientation);
      running = true;
      startScreen.classList.add('hidden');
      levelScreen.style.display = 'flex';
      document.getElementById('zeroBtn').focus();
    }

    function requestAndStart() {
      errEl.textContent = '';
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(function(state) {
          if (state === 'granted') startIMU();
          else errEl.textContent = 'Permissão negada. Não dá pra ler a orientação.';
        }).catch(function(){
          errEl.textContent = 'Não foi possível pedir permissão do sensor.';
        });
      } else {
        startIMU();
      }
    }

    document.getElementById('startBtn').addEventListener('click', requestAndStart);
    document.getElementById('zeroBtn').addEventListener('click', function() {
      offsetBeta = lastBeta; offsetGamma = lastGamma;
      statusEl.textContent = 'Calibrado ✓';
      setTimeout(render, 0);
    });
    document.getElementById('resetBtn').addEventListener('click', function() {
      offsetBeta = 0; offsetGamma = 0; render();
    });

    // Navegação D-pad
    document.addEventListener('keydown', function(e) {
      var focusables = Array.from(document.querySelectorAll('.focusable:not(.hidden)'))
        .filter(function(el){ return el.offsetParent !== null; });
      if (!focusables.length) return;
      var idx = focusables.indexOf(document.activeElement);

      switch (e.key) {
        case DPAD.LEFT: case DPAD.UP:
          idx = idx > 0 ? idx - 1 : focusables.length - 1;
          focusables[idx].focus(); e.preventDefault(); break;
        case DPAD.RIGHT: case DPAD.DOWN:
          idx = idx < focusables.length - 1 ? idx + 1 : 0;
          focusables[idx].focus(); e.preventDefault(); break;
        case DPAD.SELECT:
          if (document.activeElement.classList.contains('focusable')) {
            document.activeElement.click(); e.preventDefault();
          }
          break;
      }
    });

    document.getElementById('startBtn').focus();
  </script>
</body>
</html>
