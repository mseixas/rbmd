<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Cronômetro de tiro esportivo IPSC para Ray-Ban Meta Display">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>Shot Timer IPSC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 600px;
      height: 600px;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    /* ── SCREENS ── */
    .screen { 
      width: 600px; height: 600px; 
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      position: absolute; top: 0; left: 0;
    }
    .screen.active { display: flex; }

    /* ── HOME SCREEN ── */
    #screen-home {
      gap: 0;
    }

    .home-icon {
      font-size: 56px;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 16px #ff3c00aa);
    }

    .home-title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #ff3c00;
      text-shadow: 0 0 20px #ff3c0088;
      margin-bottom: 4px;
    }

    .home-subtitle {
      font-size: 13px;
      letter-spacing: 3px;
      color: #888;
      margin-bottom: 48px;
    }

    .btn-start {
      width: 220px;
      height: 72px;
      background: transparent;
      border: 2px solid #ff3c00;
      color: #ff3c00;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 150ms ease;
      margin-bottom: 16px;
      box-shadow: 0 0 20px #ff3c0033;
    }

    .btn-start.focusable:focus {
      outline: none;
      background: #ff3c00;
      color: #000;
      box-shadow: 0 0 40px #ff3c0088;
    }

    .btn-history {
      width: 220px;
      height: 52px;
      background: transparent;
      border: 1px solid #444;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-history.focusable:focus {
      outline: none;
      border-color: #aaa;
      color: #fff;
    }

    /* ── COUNTDOWN SCREEN ── */
    #screen-countdown {
      gap: 8px;
      background: #000;
    }

    .countdown-label {
      font-size: 14px;
      letter-spacing: 4px;
      color: #888;
      margin-bottom: 8px;
    }

    .countdown-number {
      font-size: 160px;
      font-weight: bold;
      color: #ff3c00;
      text-shadow: 0 0 60px #ff3c00cc, 0 0 120px #ff3c0055;
      line-height: 1;
      transition: transform 200ms ease;
    }

    .countdown-number.pulse {
      transform: scale(1.1);
    }

    .countdown-sub {
      font-size: 13px;
      letter-spacing: 3px;
      color: #444;
      margin-top: 16px;
    }

    /* ── RUNNING SCREEN ── */
    #screen-running {
      justify-content: flex-start;
      padding: 24px 28px 16px;
      gap: 0;
    }

    .run-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .run-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff3c00;
      box-shadow: 0 0 8px #ff3c00;
      animation: blink 800ms infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* TPD */
    .tpd-block {
      width: 100%;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .tpd-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #ff3c00;
      margin-bottom: 4px;
    }

    .tpd-value {
      font-size: 52px;
      font-weight: bold;
      color: #ff3c00;
      text-shadow: 0 0 24px #ff3c0066;
      letter-spacing: -1px;
    }

    .tpd-placeholder {
      font-size: 52px;
      font-weight: bold;
      color: #1e1e1e;
      letter-spacing: -1px;
    }

    /* TOTAL */
    .total-block {
      width: 100%;
      margin-bottom: 16px;
    }

    .total-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
      margin-bottom: 4px;
    }

    .total-value {
      font-size: 36px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 12px #ffffff44;
      letter-spacing: -0.5px;
    }

    /* SPLITS LIST */
    .splits-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
      margin-bottom: 8px;
      width: 100%;
    }

    .splits-container {
      width: 100%;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .split-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #111;
      animation: slideIn 200ms ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .split-num {
      font-size: 12px;
      color: #444;
      letter-spacing: 1px;
      width: 32px;
    }

    .split-time {
      font-size: 22px;
      color: #ccc;
      font-weight: bold;
      letter-spacing: -0.5px;
    }

    .split-time.best { color: #00e5ff; text-shadow: 0 0 8px #00e5ff88; }
    .split-time.worst { color: #ff6b35; }

    .split-bar {
      height: 2px;
      background: #333;
      flex: 1;
      margin: 0 12px;
      position: relative;
    }

    .split-bar-fill {
      height: 100%;
      background: #ff3c00;
      position: absolute;
      left: 0;
      top: 0;
    }

    /* SHOOT BUTTON (running) */
    .run-footer {
      width: 100%;
      margin-top: 12px;
      display: flex;
      gap: 12px;
    }

    .btn-shoot {
      flex: 1;
      height: 64px;
      background: transparent;
      border: 2px solid #ff3c00;
      color: #ff3c00;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 100ms ease;
    }

    .btn-shoot.focusable:focus {
      outline: none;
      background: #ff3c0022;
      box-shadow: 0 0 30px #ff3c0066;
      transform: scale(0.98);
    }

    .btn-stop-run {
      width: 88px;
      height: 64px;
      background: transparent;
      border: 1px solid #333;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-stop-run.focusable:focus {
      outline: none;
      border-color: #888;
      color: #ccc;
    }

    /* ── RESULT SCREEN ── */
    #screen-result {
      justify-content: flex-start;
      padding: 24px 28px 20px;
      gap: 0;
    }

    .result-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .result-title {
      font-size: 13px;
      letter-spacing: 4px;
      color: #00e5ff;
    }

    .result-shots {
      font-size: 12px;
      color: #555;
      letter-spacing: 2px;
    }

    .result-total {
      width: 100%;
      border: 1px solid #1a1a1a;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .result-total-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
    }

    .result-total-value {
      font-size: 44px;
      font-weight: bold;
      color: #fff;
      letter-spacing: -1px;
    }

    .result-stats {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-box {
      border: 1px solid #1a1a1a;
      padding: 10px 12px;
    }

    .stat-box-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 4px;
    }

    .stat-box-value {
      font-size: 22px;
      font-weight: bold;
      color: #ccc;
    }

    .stat-box.highlight .stat-box-value { color: #ff3c00; }
    .stat-box.best-stat .stat-box-value { color: #00e5ff; }

    .result-splits-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
      margin-bottom: 8px;
      width: 100%;
    }

    .result-splits {
      width: 100%;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .result-split-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #111;
    }

    .result-split-num {
      font-size: 11px;
      color: #333;
      letter-spacing: 1px;
      width: 28px;
    }

    .result-split-val {
      font-size: 20px;
      font-weight: bold;
      color: #aaa;
    }

    .result-split-val.rs-best { color: #00e5ff; }
    .result-split-val.rs-worst { color: #ff6b35; }

    .result-footer {
      width: 100%;
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    .btn-again {
      flex: 1;
      height: 60px;
      background: transparent;
      border: 2px solid #ff3c00;
      color: #ff3c00;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-again.focusable:focus {
      outline: none;
      background: #ff3c00;
      color: #000;
    }

    .btn-home {
      width: 100px;
      height: 60px;
      background: transparent;
      border: 1px solid #333;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-home.focusable:focus {
      outline: none;
      border-color: #888;
      color: #ccc;
    }

    /* ── HISTORY SCREEN ── */
    #screen-history {
      justify-content: flex-start;
      padding: 24px 28px 20px;
      gap: 0;
    }

    .hist-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .hist-title {
      font-size: 13px;
      letter-spacing: 4px;
      color: #ff3c00;
    }

    .hist-list {
      width: 100%;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hist-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #111;
    }

    .hist-row-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hist-row-date {
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
    }

    .hist-row-shots {
      font-size: 12px;
      color: #666;
      letter-spacing: 1px;
    }

    .hist-row-total {
      font-size: 28px;
      font-weight: bold;
      color: #ccc;
      letter-spacing: -0.5px;
    }

    .hist-empty {
      color: #333;
      font-size: 14px;
      letter-spacing: 2px;
      text-align: center;
      margin-top: 60px;
      width: 100%;
    }

    .btn-hist-back {
      width: 100%;
      height: 56px;
      background: transparent;
      border: 1px solid #333;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 150ms ease;
      margin-top: 14px;
    }

    .btn-hist-back.focusable:focus {
      outline: none;
      border-color: #888;
      color: #ccc;
    }

    /* ── BEEP VISUAL FLASH ── */
    .beep-flash {
      position: fixed;
      inset: 0;
      background: #ff3c00;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 80ms;
    }

    .beep-flash.on { opacity: 0.18; }
  </style>
</head>
<body>

<!-- Flash overlay para beep visual -->
<div class="beep-flash" id="beepFlash"></div>

<!-- ── HOME ── -->
<div class="screen active" id="screen-home">
  <div class="home-icon">🎯</div>
  <div class="home-title">SHOT TIMER</div>
  <div class="home-subtitle">IPSC · IDPA · USPSA</div>
  <button class="btn-start focusable" id="btnStart" autofocus>COMEÇAR</button>
  <button class="btn-history focusable" id="btnHistory">HISTÓRICO</button>
</div>

<!-- ── COUNTDOWN ── -->
<div class="screen" id="screen-countdown">
  <div class="countdown-label">PREPARA-SE...</div>
  <div class="countdown-number" id="countdownNum">3</div>
  <div class="countdown-sub">AGUARDE O SINAL</div>
</div>

<!-- ── RUNNING ── -->
<div class="screen" id="screen-running">
  <div class="run-header">
    <span class="run-label">ATIRANDO</span>
    <div class="live-dot"></div>
  </div>

  <div class="tpd-block">
    <div class="tpd-label">TPD — TEMPO DO PRIMEIRO DISPARO</div>
    <div id="tpdDisplay" class="tpd-placeholder">—.——s</div>
  </div>

  <div class="total-block">
    <div class="total-label">TEMPO TOTAL</div>
    <div id="totalDisplay" class="total-value">0.00s</div>
  </div>

  <div class="splits-label">SPLITS</div>
  <div class="splits-container" id="splitsContainer"></div>

  <div class="run-footer">
    <button class="btn-shoot focusable" id="btnShoot" autofocus>● DISPARO</button>
    <button class="btn-stop-run focusable" id="btnStopRun">PARAR</button>
  </div>
</div>

<!-- ── RESULT ── -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <span class="result-title">✓ SESSÃO</span>
    <span class="result-shots" id="resultShots">0 DISPAROS</span>
  </div>

  <div class="result-total">
    <div>
      <div class="result-total-label">TEMPO TOTAL</div>
    </div>
    <div class="result-total-value" id="resultTotal">0.00s</div>
  </div>

  <div class="result-stats">
    <div class="stat-box highlight">
      <div class="stat-box-label">TPD</div>
      <div class="stat-box-value" id="resTpd">—</div>
    </div>
    <div class="stat-box best-stat">
      <div class="stat-box-label">MELHOR</div>
      <div class="stat-box-value" id="resBest">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-box-label">MÉDIA</div>
      <div class="stat-box-value" id="resAvg">—</div>
    </div>
  </div>

  <div class="result-splits-title">TODOS OS SPLITS</div>
  <div class="result-splits" id="resultSplits"></div>

  <div class="result-footer">
    <button class="btn-again focusable" id="btnAgain" autofocus>NOVAMENTE</button>
    <button class="btn-home focusable" id="btnHome">INÍCIO</button>
  </div>
</div>

<!-- ── HISTORY ── -->
<div class="screen" id="screen-history">
  <div class="hist-header">
    <span class="hist-title">HISTÓRICO</span>
  </div>
  <div class="hist-list" id="histList"></div>
  <button class="btn-hist-back focusable" id="btnHistBack" autofocus>← VOLTAR</button>
</div>

<script>
  // ── STATE ──────────────────────────────────────────────
  const state = {
    screen: 'home',
    startTime: 0,
    lastShotTime: 0,
    splits: [],        // tempo entre cada disparo (split)
    totalTimer: null,
    countdownTimer: null,
    countdownVal: 0,
  };

  // ── SCREEN MANAGEMENT ─────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    state.screen = id;

    // auto-focus first focusable
    const first = document.querySelector('#screen-' + id + ' .focusable');
    if (first) setTimeout(() => first.focus(), 50);
  }

  // ── AUDIO BEEP (Web Audio API) ─────────────────────────
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playBeep(freq, duration, volume) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  function playStartSignal() {
    // Beep de largada IPSC: tom alto e nítido
    playBeep(880, 0.4, 0.8);
    flashScreen();
  }

  function playPreBeep() {
    // Beep de contagem
    playBeep(440, 0.15, 0.4);
  }

  function flashScreen() {
    const f = document.getElementById('beepFlash');
    f.classList.add('on');
    setTimeout(() => f.classList.remove('on'), 120);
  }

  // ── FORMAT TIME ───────────────────────────────────────
  function fmt(ms) {
    return (ms / 1000).toFixed(2) + 's';
  }

  // ── COUNTDOWN → START ─────────────────────────────────
  function startCountdown() {
    showScreen('countdown');
    
    // Delay aleatório IPSC: 1 a 4 segundos
    const randomDelay = Math.floor(Math.random() * 3000) + 1000;
    const steps = [3, 2, 1];
    let step = 0;

    const numEl = document.getElementById('countdownNum');

    function tick() {
      if (step < steps.length) {
        numEl.textContent = steps[step];
        numEl.classList.add('pulse');
        setTimeout(() => numEl.classList.remove('pulse'), 200);
        playPreBeep();
        step++;
        state.countdownTimer = setTimeout(tick, 800);
      } else {
        // Aguarda delay aleatório depois do "1"
        state.countdownTimer = setTimeout(() => {
          playStartSignal();
          startRunning();
        }, randomDelay);
      }
    }

    tick();
  }

  // ── RUNNING ───────────────────────────────────────────
  function startRunning() {
    state.splits = [];
    state.startTime = performance.now();
    state.lastShotTime = state.startTime;

    showScreen('running');
    updateRunningDisplay();

    // Atualiza timer total a cada 50ms
    state.totalTimer = setInterval(updateRunningDisplay, 50);
  }

  function updateRunningDisplay() {
    if (state.screen !== 'running') return;
    const now = performance.now();
    const total = now - state.startTime;
    document.getElementById('totalDisplay').textContent = fmt(total);
  }

  function registerShot() {
    if (state.screen !== 'running') return;
    const now = performance.now();
    const split = now - state.lastShotTime;
    state.splits.push(split);
    state.lastShotTime = now;

    playBeep(660, 0.08, 0.3); // clique suave de feedback
    flashScreen();
    renderSplitsRunning();
    updateRunningDisplay();
  }

  function renderSplitsRunning() {
    const container = document.getElementById('splitsContainer');
    const splits = state.splits;
    const tpdEl = document.getElementById('tpdDisplay');

    // TPD = primeiro split
    if (splits.length > 0) {
      tpdEl.className = 'tpd-value';
      tpdEl.textContent = fmt(splits[0]);
    }

    // Mostra últimos 4 splits (os mais recentes no topo)
    const visible = splits.slice(-4).reverse();
    const minSplit = Math.min(...splits);
    const maxSplit = Math.max(...splits);
    const range = maxSplit - minSplit || 1;

    container.innerHTML = '';
    visible.forEach((ms, i) => {
      const realIdx = splits.length - i; // número do disparo
      const row = document.createElement('div');
      row.className = 'split-row';

      let cls = 'split-time';
      if (splits.length > 1) {
        if (ms === minSplit) cls += ' best';
        else if (ms === maxSplit) cls += ' worst';
      }

      const barPct = ((ms - minSplit) / range * 100).toFixed(1);

      row.innerHTML = `
        <span class="split-num">#${realIdx}</span>
        <div class="split-bar"><div class="split-bar-fill" style="width:${barPct}%"></div></div>
        <span class="${cls}">${fmt(ms)}</span>
      `;
      container.appendChild(row);
    });
  }

  function stopSession() {
    clearInterval(state.totalTimer);
    clearTimeout(state.countdownTimer);

    const totalMs = state.lastShotTime - state.startTime;
    showResult(totalMs);
  }

  // ── RESULT ────────────────────────────────────────────
  function showResult(totalMs) {
    const splits = state.splits;
    const n = splits.length;

    document.getElementById('resultShots').textContent = n + (n === 1 ? ' DISPARO' : ' DISPAROS');
    document.getElementById('resultTotal').textContent = fmt(totalMs);

    if (n > 0) {
      document.getElementById('resTpd').textContent = fmt(splits[0]);
      const best = Math.min(...splits);
      const avg = splits.reduce((a, b) => a + b, 0) / n;
      document.getElementById('resBest').textContent = fmt(best);
      document.getElementById('resAvg').textContent = fmt(avg);
    }

    const container = document.getElementById('resultSplits');
    container.innerHTML = '';
    const minS = splits.length > 0 ? Math.min(...splits) : 0;
    const maxS = splits.length > 0 ? Math.max(...splits) : 0;

    splits.forEach((ms, i) => {
      const row = document.createElement('div');
      row.className = 'result-split-row';

      let cls = 'result-split-val';
      if (splits.length > 1) {
        if (ms === minS) cls += ' rs-best';
        else if (ms === maxS) cls += ' rs-worst';
      }

      const label = i === 0 ? 'TPD' : `S${i + 1}`;
      row.innerHTML = `
        <span class="result-split-num">${label}</span>
        <span class="${cls}">${fmt(ms)}</span>
      `;
      container.appendChild(row);
    });

    // Salva no localStorage
    saveSession(totalMs, splits);

    showScreen('result');
  }

  // ── STORAGE ───────────────────────────────────────────
  function saveSession(totalMs, splits) {
    try {
      const sessions = JSON.parse(localStorage.getItem('ipsc_sessions') || '[]');
      sessions.unshift({
        date: new Date().toISOString(),
        total: totalMs,
        shots: splits.length,
        tpd: splits[0] || 0,
        splits: splits,
      });
      // Mantém últimas 20 sessões
      localStorage.setItem('ipsc_sessions', JSON.stringify(sessions.slice(0, 20)));
    } catch(e) {}
  }

  function loadHistory() {
    const container = document.getElementById('histList');
    container.innerHTML = '';
    try {
      const sessions = JSON.parse(localStorage.getItem('ipsc_sessions') || '[]');
      if (sessions.length === 0) {
        container.innerHTML = '<div class="hist-empty">SEM SESSÕES</div>';
        return;
      }
      sessions.slice(0, 6).forEach(s => {
        const d = new Date(s.date);
        const dateStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        const row = document.createElement('div');
        row.className = 'hist-row';
        row.innerHTML = `
          <div class="hist-row-left">
            <span class="hist-row-date">${dateStr}</span>
            <span class="hist-row-shots">${s.shots} disparos · TPD ${fmt(s.tpd)}</span>
          </div>
          <span class="hist-row-total">${fmt(s.total)}</span>
        `;
        container.appendChild(row);
      });
    } catch(e) {}
  }

  // ── D-PAD INPUT ───────────────────────────────────────
  const DPAD = {
    UP: 'ArrowUp', DOWN: 'ArrowDown',
    LEFT: 'ArrowLeft', RIGHT: 'ArrowRight',
    SELECT: 'Enter', BACK: 'Escape',
  };

  function moveFocus(direction) {
    const focusables = Array.from(
      document.querySelectorAll('#screen-' + state.screen + ' .focusable:not([disabled])')
    );
    if (!focusables.length) return;
    const idx = focusables.indexOf(document.activeElement);
    if (idx === -1) { focusables[0].focus(); return; }
    const next = (direction === 'up' || direction === 'left')
      ? (idx > 0 ? idx - 1 : focusables.length - 1)
      : (idx < focusables.length - 1 ? idx + 1 : 0);
    focusables[next].focus();
  }

  document.addEventListener('keydown', function(e) {
    switch (e.key) {
      case DPAD.UP:    moveFocus('up');   break;
      case DPAD.DOWN:  moveFocus('down'); break;
      case DPAD.LEFT:  moveFocus('left'); break;
      case DPAD.RIGHT: moveFocus('right'); break;
      case DPAD.SELECT:
        if (document.activeElement && document.activeElement.classList.contains('focusable')) {
          document.activeElement.click();
        }
        break;
      case DPAD.BACK:
        if (state.screen === 'history') showScreen('home');
        break;
      default: return;
    }
    e.preventDefault();
  });

  // ── BUTTON EVENTS ─────────────────────────────────────
  document.getElementById('btnStart').addEventListener('click', () => {
    // Inicializa AudioContext após gesto do usuário
    getAudioCtx();
    startCountdown();
  });

  document.getElementById('btnHistory').addEventListener('click', () => {
    loadHistory();
    showScreen('history');
  });

  document.getElementById('btnShoot').addEventListener('click', () => {
    registerShot();
  });

  document.getElementById('btnStopRun').addEventListener('click', () => {
    stopSession();
  });

  document.getElementById('btnAgain').addEventListener('click', () => {
    startCountdown();
  });

  document.getElementById('btnHome').addEventListener('click', () => {
    showScreen('home');
  });

  document.getElementById('btnHistBack').addEventListener('click', () => {
    showScreen('home');
  });

  // Foco inicial
  document.getElementById('btnStart').focus();
</script>
</body>
</html>
