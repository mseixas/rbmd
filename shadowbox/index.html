<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Chamador de combinacoes de shadowbox para Meta Ray-Ban Display - 18 combos, rounds aleatorios, beep e flash.">
  <meta name="mrbd-web-app-capable" content="yes">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Shadowbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 600px; height: 600px; overflow: hidden;
      background: #000; color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    #app { width: 600px; height: 600px; position: relative; }
    .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    h1 { font-size: 32px; color: #00d4ff; margin-top: 24px; }
    .sub { font-size: 15px; color: #777; margin-top: 6px; text-align: center; max-width: 500px; }

    .focusable { transition: all 150ms ease; border: 2px solid #333; min-height: 88px; outline: none; }
    .focusable:focus { border-color: #00d4ff; box-shadow: 0 0 20px rgba(0,212,255,0.45); }
    button.focusable {
      background: #111; color: #fff; font-size: 21px; font-weight: 600;
      padding: 0 28px; border-radius: 16px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    }

    /* Config */
    #config .rows { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; width: 510px; }
    .row { display: flex; align-items: center; justify-content: space-between;
      background: #0d0d0d; border: 2px solid #333; border-radius: 16px; min-height: 76px; padding: 0 20px; }
    .row.focusable:focus { border-color: #00d4ff; box-shadow: 0 0 20px rgba(0,212,255,0.45); }
    .row .lbl { font-size: 20px; color: #ddd; }
    .row .ctl { display: flex; align-items: center; gap: 14px; }
    .row .val { font-size: 26px; font-weight: 800; color: #00e0ff; min-width: 120px; text-align: center; font-variant-numeric: tabular-nums; }
    .row .hintk { font-size: 13px; color: #666; }
    #startBtn { margin-top: 14px; min-width: 320px; }

    /* Run */
    #run { justify-content: flex-start; padding-top: 18px; }
    #runHead { display: flex; justify-content: space-between; width: 540px; font-size: 20px; color: #aaa; }
    #runHead .phase { font-weight: 800; letter-spacing: 1px; }
    #runHead .phase.work { color: #2ecc71; } #runHead .phase.rest { color: #ffb020; }
    #clock { font-size: 60px; font-weight: 800; margin-top: 4px; font-variant-numeric: tabular-nums; }
    #comboBox {
      margin-top: 18px; width: 540px; min-height: 230px; border-radius: 22px;
      background: linear-gradient(160deg, #0a0a0a, #141414); border: 2px solid #222;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 10px;
    }
    #comboNum { font-size: 22px; color: #00d4ff; font-weight: 700; }
    #comboText { font-size: 46px; font-weight: 800; color: #fff; text-align: center; line-height: 1.1; }
    #comboText.rest { color: #ffb020; font-size: 40px; }
    #runControls { margin-top: 20px; display: flex; gap: 14px; }
    #runControls button.focusable { min-height: 60px; font-size: 18px; padding: 0 22px; }

    #flash { position: absolute; inset: 0; background: #2ecc71; opacity: 0; z-index: 50; pointer-events: none; transition: opacity 90ms; }
    #flash.show { opacity: 0.8; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <div id="flash"></div>

    <!-- CONFIG -->
    <div id="config" class="screen active">
      <h1>Shadowbox</h1>
      <div class="sub">Rounds com combos sorteados dos 18 cadastrados. Ajuste ◀ ▶ · role ▲ ▼ · Enter inicia.</div>
      <div class="rows">
        <div class="row focusable" data-key="rounds">
          <span class="lbl">Rounds</span>
          <div class="ctl"><span class="hintk">◀ ▶</span><span class="val" id="v-rounds">3</span></div>
        </div>
        <div class="row focusable" data-key="work">
          <span class="lbl">Execução (round)</span>
          <div class="ctl"><span class="hintk">◀ ▶</span><span class="val" id="v-work">2:00</span></div>
        </div>
        <div class="row focusable" data-key="rest">
          <span class="lbl">Descanso</span>
          <div class="ctl"><span class="hintk">◀ ▶</span><span class="val" id="v-rest">0:45</span></div>
        </div>
        <div class="row focusable" data-key="interval">
          <span class="lbl">Intervalo entre combos</span>
          <div class="ctl"><span class="hintk">◀ ▶</span><span class="val" id="v-interval">4 s</span></div>
        </div>
      </div>
      <button id="startBtn" class="focusable">▶  Iniciar</button>
    </div>

    <!-- RUN -->
    <div id="run" class="screen">
      <div id="runHead">
        <span class="phase work" id="phaseLbl">LUTA</span>
        <span id="roundLbl">Round 1 / 3</span>
      </div>
      <div id="clock">2:00</div>
      <div id="comboBox">
        <div id="comboNum">COMBO 4</div>
        <div id="comboText">Jab + Cross + Hook + Cross</div>
      </div>
      <div id="runControls">
        <button id="pauseBtn" class="focusable">Pausar</button>
        <button id="nextBtn" class="focusable">Próximo</button>
        <button id="stopBtn" class="focusable">Parar</button>
      </div>
    </div>
  </div>

  <script>
    var DPAD = { UP:'ArrowUp', DOWN:'ArrowDown', LEFT:'ArrowLeft', RIGHT:'ArrowRight', SELECT:'Enter' };

    /* =====================================================================
       COMBOS — edite esta lista à vontade. Adicione/remova linhas livremente;
       a numeração e o sorteio se ajustam sozinhos.
    ===================================================================== */
    var COMBOS = [
      "Jab",
      "Jab + Cross",
      "Cross + Hook + Cross",
      "Jab + Cross + Hook + Cross",
      "Upper + Hook + Cross + Upper",
      "Upper + Cross + Hook + Upper",
      "Duck L + Hook + Cross + Hook",
      "Duck R + Cross + Hook + Cross",
      "Esq L + Jab + Cross",
      "Esq R + Cross + Jab",
      "Block L + Duck + Hook + Hook + Cross + Hook",
      "Block R + Duck + Hook + Upper + Hook + Cross",
      "Block Kick L + Hook + Cross + Kick R",
      "Block Kick R + Cross + Hook + Switch + Kick L",
      "5 Elbows + 3 Knees",
      "5 Elbows + 3 Knees",
      "Front 1 + Round 2 + Round Side Full",
      "Front 2 + Switch + Round 2 + Round Side"
    ];
    /* ===================================================================== */

    // ---- Beep + flash ----
    var audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ audioCtx = null; } }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    function beep(freq, durMs, when) {
      if (!audioCtx) return;
      try {
        var t = audioCtx.currentTime + (when || 0);
        var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type='square'; osc.frequency.value=freq;
        gain.gain.setValueAtTime(0.0001,t);
        gain.gain.exponentialRampToValueAtTime(0.3,t+0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001,t+durMs/1000);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t+durMs/1000+0.02);
      } catch(e){}
    }
    var flashEl = document.getElementById('flash');
    function flash(color){ flashEl.style.background=color||'#2ecc71'; flashEl.classList.add('show');
      setTimeout(function(){ flashEl.classList.remove('show'); },300); }
    function sigCombo()    { beep(900,80); }
    function sigRoundStart(){ flash('#2ecc71'); beep(880,150); beep(1320,200,0.18); }
    function sigRest()     { flash('#ffb020'); beep(440,250); }
    function sigEnd()      { flash('#00d4ff'); beep(660,150); beep(660,150,0.2); beep(990,400,0.4); }
    function tickWarn()    { beep(700,90); }

    // ---- Config ----
    var cfg = { rounds: 3, work: 120, rest: 45, interval: 4 };
    function fmt(s){ var m=Math.floor(s/60), r=s%60; return m+':'+String(r).padStart(2,'0'); }
    function renderConfig(){
      document.getElementById('v-rounds').textContent = cfg.rounds;
      document.getElementById('v-work').textContent = fmt(cfg.work);
      document.getElementById('v-rest').textContent = fmt(cfg.rest);
      document.getElementById('v-interval').textContent = cfg.interval + ' s';
    }
    function adjust(key,dir){
      if(key==='rounds')   cfg.rounds=Math.max(1,Math.min(20,cfg.rounds+dir));
      if(key==='work')     cfg.work=Math.max(15,Math.min(600,cfg.work+dir*15));
      if(key==='rest')     cfg.rest=Math.max(0,Math.min(300,cfg.rest+dir*15));
      if(key==='interval') cfg.interval=Math.max(1,Math.min(15,cfg.interval+dir));
      renderConfig();
    }

    // ---- Execução ----
    var configScreen=document.getElementById('config'), runScreen=document.getElementById('run');
    var clockEl=document.getElementById('clock'), phaseLbl=document.getElementById('phaseLbl'),
        roundLbl=document.getElementById('roundLbl'), comboNum=document.getElementById('comboNum'),
        comboText=document.getElementById('comboText'), pauseBtn=document.getElementById('pauseBtn');

    var timer=null, paused=false, phase='work', round=1, remaining=0, sinceCombo=0, lastIdx=-1;

    function randomCombo(){
      var i = Math.floor(Math.random()*COMBOS.length);
      if (COMBOS.length > 1 && i === lastIdx) i = (i+1)%COMBOS.length; // evita repetir igual seguido
      lastIdx = i;
      comboNum.textContent = 'COMBO ' + (i+1);
      comboText.textContent = COMBOS[i];
      comboText.classList.remove('rest');
      sigCombo();
    }
    function showRest(){
      comboNum.textContent = 'DESCANSO';
      comboText.textContent = 'Respire';
      comboText.classList.add('rest');
    }
    function setPhase(p){
      phase=p;
      phaseLbl.className='phase '+(p==='work'?'work':'rest');
      phaseLbl.textContent = p==='work'?'LUTA':p==='rest'?'DESCANSO':'FIM';
    }
    function showHead(){ clockEl.textContent=fmt(remaining); roundLbl.textContent='Round '+round+' / '+cfg.rounds; }

    function startSession(){
      ensureAudio();
      round=1; setPhase('work'); remaining=cfg.work; sinceCombo=0; lastIdx=-1;
      configScreen.classList.remove('active'); runScreen.classList.add('active');
      paused=false; pauseBtn.textContent='Pausar';
      sigRoundStart(); randomCombo(); showHead();
      runTimer();
    }
    function runTimer(){
      clearInterval(timer);
      timer=setInterval(function(){
        if(paused) return;
        remaining--; sinceCombo++;
        if(remaining>0 && remaining<=3) tickWarn();
        if(phase==='work' && sinceCombo>=cfg.interval){ sinceCombo=0; randomCombo(); }
        if(remaining<=0) nextPhase();
        showHead();
      },1000);
    }
    function nextPhase(){
      if(phase==='work'){
        if(round>=cfg.rounds){ finish(); return; }
        if(cfg.rest>0){ setPhase('rest'); remaining=cfg.rest; sigRest(); showRest(); }
        else { round++; setPhase('work'); remaining=cfg.work; sinceCombo=0; sigRoundStart(); randomCombo(); }
      } else if(phase==='rest'){
        round++; setPhase('work'); remaining=cfg.work; sinceCombo=0; sigRoundStart(); randomCombo();
      }
    }
    function finish(){ clearInterval(timer); setPhase('done'); remaining=0; showHead();
      comboNum.textContent='FIM'; comboText.textContent='Treino concluído'; comboText.classList.remove('rest'); sigEnd(); }
    function stopSession(){ clearInterval(timer); runScreen.classList.remove('active'); configScreen.classList.add('active'); focusFirst(); }

    document.getElementById('startBtn').addEventListener('click', startSession);
    pauseBtn.addEventListener('click', function(){ paused=!paused; this.textContent=paused?'Retomar':'Pausar'; });
    document.getElementById('nextBtn').addEventListener('click', function(){ if(phase==='work'){ sinceCombo=0; randomCombo(); } });
    document.getElementById('stopBtn').addEventListener('click', stopSession);
    Array.from(document.querySelectorAll('#config .row')).forEach(function(row){
      row.addEventListener('click', function(){ adjust(row.getAttribute('data-key'), +1); });
    });

    function focusFirst(){
      var f=Array.from(document.querySelectorAll('.screen.active .focusable')).filter(function(el){return el.offsetParent!==null;});
      if(f.length) f[0].focus();
    }
    document.addEventListener('keydown', function(e){
      ensureAudio();
      var f=Array.from(document.querySelectorAll('.screen.active .focusable')).filter(function(el){return el.offsetParent!==null;});
      if(!f.length) return;
      var idx=f.indexOf(document.activeElement), active=document.activeElement;
      var key=active&&active.getAttribute?active.getAttribute('data-key'):null;
      switch(e.key){
        case DPAD.UP: idx=idx>0?idx-1:f.length-1; f[idx].focus(); e.preventDefault(); break;
        case DPAD.DOWN: idx=idx<f.length-1?idx+1:0; f[idx].focus(); e.preventDefault(); break;
        case DPAD.LEFT:
          if(key){ adjust(key,-1); e.preventDefault(); }
          else { idx=idx>0?idx-1:f.length-1; f[idx].focus(); e.preventDefault(); } break;
        case DPAD.RIGHT:
          if(key){ adjust(key,+1); e.preventDefault(); }
          else { idx=idx<f.length-1?idx+1:0; f[idx].focus(); e.preventDefault(); } break;
        case DPAD.SELECT:
          if(active.classList.contains('focusable')){ active.click(); e.preventDefault(); } break;
      }
    });

    renderConfig();
    focusFirst();
  </script>
</body>
</html>
